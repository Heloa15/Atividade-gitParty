<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalhes do Evento</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Plus Jakarta Sans',sans-serif;
}

</style>

</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-yellow-100 min-h-screen">



<header class="bg-white shadow-md p-6 flex justify-between items-center">

<h1 class="text-3xl font-bold text-blue-600">
Detalhes do Evento
</h1>

<button
onclick="voltar()"
class="bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition"
>

Voltar

</button>

</header>



<main class="max-w-5xl mx-auto p-8">



<div class="bg-white rounded-2xl shadow-lg p-8">

<h2 id="tituloEvento" class="text-4xl font-bold text-gray-800 mb-6">
</h2>

<div class="flex flex-col gap-3 text-gray-600 mb-6">

<p>
<strong>Data:</strong>
<span id="dataEvento"></span>
</p>

<p>
<strong>Local:</strong>
<span id="localEvento"></span>
</p>

</div>

<div class="mb-8">

<h3 class="text-2xl font-bold mb-3">
Descrição
</h3>

<p id="descricaoEvento" class="text-gray-700 leading-relaxed">
</p>

</div>



<div class="mb-8">

<h3 class="text-2xl font-bold mb-4">
Adicionar Imagem
</h3>

<div class="flex gap-4 items-center">

<input
type="file"
id="inputImagem"
accept="image/*"
class="border p-2 rounded-lg bg-gray-50"
/>

<button
onclick="uploadImagem()"
class="bg-blue-600 text-white px-6 py-2 rounded-xl hover:bg-blue-700 transition"
>

Enviar Imagem

</button>

</div>

</div>



<div>

<h3 class="text-2xl font-bold mb-4">
Galeria de Imagens
</h3>

<div
id="listaImagens"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
>

</div>

</div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
